<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アメ何個いる？ポケモンスリープ アメ・経験値シミュレータ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: #f0f0f0;
      color: #2d3748;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #eee;
      padding: 18px 20px 16px;
      border-bottom: 1px solid #ddd;
    }
    .header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #2d3748;
      line-height: 1.4;
    }

    /* Content */
    .content { padding: 20px; }

    /* Level selectors */
    .levels {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      margin-bottom: 14px;
      align-items: start;
    }
    .level-block { display: flex; flex-direction: column; align-items: center; }
    .level-block label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: #2d3748;
    }
    .level-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .btn-pm {
      width: 48px; height: 48px;
      border-radius: 50px;
      border: none;
      background: #e8e8e8;
      font-size: 1.5rem;
      font-weight: 300;
      color: #555;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      user-select: none;
      touch-action: manipulation;
    }
    .btn-pm:hover { background: #d5d5d5; }
    .btn-pm:active { background: #c8c8c8; }
    .btn-pm:disabled { opacity: 0.35; cursor: default; }

    .level-number {
      font-size: 1.9rem;
      font-weight: 700;
      min-width: 38px;
      text-align: center;
      color: #2d3748;
    }
    .level-number.target { color: #2979ff; }

    /* Slider */
    .slider-wrap { width: 100%; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #e0e0e0;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #4caf50;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #4caf50;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* Setting rows */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 8px;
    }
    .setting-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .help-badge {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #666;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .help-badge:hover { background: #c8c8c8; }

    .type-help-popup {
      display: none;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      font-size: 0.82rem;
      color: #444;
      line-height: 1.6;
    }
    .type-help-popup.open { display: block; }
    .type-help-popup dt {
      font-weight: 700;
      color: #2d3748;
      margin-top: 6px;
    }
    .type-help-popup dt:first-child { margin-top: 0; }
    .type-help-popup dd { margin-left: 0; color: #666; }

    /* Segment control */
    .segment {
      display: flex;
      background: #f0f0f0;
      border-radius: 50px;
      padding: 3px;
      gap: 1px;
    }
    .segment button {
      border: none;
      background: transparent;
      border-radius: 50px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .segment button.active {
      background: #4caf50;
      color: #fff;
    }

    /* Type segment: number + sub-label */
    .segment.type button {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 8px;
      gap: 1px;
    }
    .segment.type .t-num { font-size: 0.88rem; font-weight: 700; }
    .segment.type .t-sub { font-size: 0.58rem; font-weight: 400; opacity: 0.85; }

    /* Nature segment */
    .segment.nature button { font-size: 1rem; padding: 5px 12px; }

    /* Mini checkbox */
    .mini-check-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
      user-select: none;
    }
    .mini-check-label input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #4caf50;
      cursor: pointer;
      flex-shrink: 0;
    }


    /* Remaining EXP section */
    .exp-section { margin-bottom: 22px; }
    .exp-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .exp-number-input {
      width: 110px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #2d3748;
      text-align: right;
      outline: none;
      -moz-appearance: textfield;
    }
    .exp-number-input::-webkit-inner-spin-button,
    .exp-number-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .exp-number-input:focus { border-color: #4caf50; }

    .mini-cap-input {
      width: 58px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #2d3748;
      text-align: right;
      outline: none;
      -moz-appearance: textfield;
    }
    .mini-cap-input::-webkit-inner-spin-button,
    .mini-cap-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .mini-cap-input:focus { border-color: #4caf50; }

    .breakdown-mini  { font-weight: 700; color: #4caf50; }
    .breakdown-normal { font-weight: 700; color: #2d3748; }

    /* Divider */
    .divider {
      height: 1px;
      background: #eee;
      margin: 4px -20px 24px;
    }

    .candy-svg { width: 38px; height: 38px; }
    .candy-count {
      font-size: 3rem;
      font-weight: 800;
      color: #2d3748;
      line-height: 1;
    }
    .candy-unit {
      font-size: 1.3rem;
      font-weight: 600;
      color: #2d3748;
      align-self: flex-end;
      margin-bottom: 4px;
    }
    .val-shards { font-weight: 700; color: #e8a020; }
    .val-exp { font-weight: 700; color: #4caf50; }
    .diamond { color: #e8a020; font-size: 0.75rem; }

    /* Section labels */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Arrow between levels */
    .level-arrow {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 42px;
      color: #4caf50;
      font-size: 1.4rem;
      font-weight: 300;
    }

    /* Nature sub-label */
    .segment.nature button {
      font-size: 1rem;
      padding: 5px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .n-sub { font-size: 0.5rem; font-weight: 400; opacity: 0.85; }

    /* Boost sub-group card */
    .boost-sub-group {
      background: #f6faf6;
      border-left: 3px solid #4caf50;
      border-radius: 0 10px 10px 0;
      padding: 8px 14px 4px;
      margin: -8px 0 14px;
    }
    .boost-sub-group .setting-row { margin-bottom: 8px; }
    .boost-sub-group .setting-row:last-child { margin-bottom: 2px; }

    /* Result cards */
    .result-cards { display: flex; flex-direction: column; gap: 10px; }
    .result-card {
      background: #f8f9fa;
      border-radius: 14px;
      padding: 14px 18px;
    }
    .result-card-label {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .candy-card { text-align: center; }
    .candy-main { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .breakdown-line {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 4px;
    }
    .shards-card, .exp-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Level shortcut buttons */
    .level-shortcuts {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      justify-content: center;
    }
    .btn-shortcut {
      font-size: 0.72rem;
      font-weight: 700;
      color: #2979ff;
      background: #e8f0fe;
      border: none;
      border-radius: 50px;
      padding: 3px 10px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-shortcut:active { background: #c5d7fb; }

    /* Cap preset buttons */
    .btn-cap-preset {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4caf50;
      background: #e8f5e9;
      border: none;
      border-radius: 50px;
      padding: 2px 9px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-cap-preset:active { background: #c8e6c9; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>アメ何個いる？<br>（ポケモンスリープ アメ・経験値シミュレータ）</h1>
  </div>

  <div class="content">
    <!-- Level selectors -->
    <div class="section-label">ポケモン情報</div>
    <div class="levels">
      <div class="level-block">
        <label>現在のレベル</label>
        <div class="level-control">
          <button class="btn-pm" id="curDec">−</button>
          <span class="level-number" id="curDisplay">15</span>
          <button class="btn-pm" id="curInc">+</button>
        </div>
        <div class="slider-wrap">
          <input type="range" id="curSlider" min="1" max="64" value="15">
        </div>
      </div>

      <div class="level-arrow">→</div>

      <div class="level-block">
        <label>目標のレベル</label>
        <div class="level-control">
          <button class="btn-pm" id="tgtDec">−</button>
          <span class="level-number target" id="tgtDisplay">50</span>
          <button class="btn-pm" id="tgtInc">+</button>
        </div>
        <div class="slider-wrap">
          <input type="range" id="tgtSlider" min="16" max="65" value="50">
        </div>
        <div class="level-shortcuts">
          <button class="btn-shortcut" data-lv="50" touch-action="manipulation">Lv50</button>
          <button class="btn-shortcut" data-lv="60" touch-action="manipulation">Lv60</button>
        </div>
      </div>
    </div>

    <!-- Remaining EXP for current level -->
    <div class="exp-section">
      <div class="exp-section-header">
        <span class="setting-label">次のレベルまでの残り経験値</span>
        <input type="number" id="expInput" min="0" value="0" class="exp-number-input">
      </div>
      <div class="slider-wrap">
        <input type="range" id="expSlider" min="0" max="100" value="100">
      </div>
    </div>

    <div class="section-label">アメの設定</div>

    <!-- EXP Type -->
    <div style="margin-bottom: 18px;">
      <div class="setting-row" style="margin-bottom: 0;">
        <div class="setting-label">
          経験値タイプ
          <span class="help-badge" id="typeHelpBtn">?</span>
        </div>
        <div class="segment type" id="typeSegment">
        <button class="active" data-val="600">
          <span class="t-num">600</span><span class="t-sub">通常</span>
        </button>
        <button data-val="900">
          <span class="t-num">900</span><span class="t-sub">600族</span>
        </button>
        <button data-val="1080">
          <span class="t-num">1080</span><span class="t-sub">伝説</span>
        </button>
        <button data-val="1260">
          <span class="t-num">1260</span><span class="t-sub">とくい:オール</span>
        </button>
      </div>
    </div>
      <dl class="type-help-popup" id="typeHelpPopup">
        <dt>600（通常）</dt>
        <dd>一般的なポケモン</dd>
        <dt>900（600族）</dt>
        <dd>カイリュー系統・バンギラス系統・ボーマンダ系統</dd>
        <dt>1080（伝説）</dt>
        <dd>エンテイ・ライコウ・スイクン・クレセリア・ラティアス・ラティオス</dd>
        <dt>1260（とくいなもの:オール）</dt>
        <dd>ミュウ・ダークライ</dd>
      </dl>
    </div>

    <!-- Nature -->
    <div class="setting-row">
      <div class="setting-label">性格による経験値補正</div>
      <div class="segment nature" id="natureSegment">
        <button data-val="down"><span>▼</span><span class="n-sub">経験値↓</span></button>
        <button class="active" data-val="neutral"><span>ー</span><span class="n-sub">通常</span></button>
        <button data-val="up"><span>▲</span><span class="n-sub">経験値↑</span></button>
      </div>
    </div>

    <!-- Boost -->
    <div class="setting-row">
      <div class="setting-label">アメブースト</div>
      <div class="segment" id="boostSegment">
        <button class="active" data-val="off">OFF</button>
        <button data-val="on">ON</button>
      </div>
    </div>

    <div class="boost-sub-group" id="boostSubGroup" style="display:none;">
      <!-- Mini checkbox (shown when boost ON) -->
      <div class="setting-row" id="miniCheckRow">
        <label class="mini-check-label" for="miniCheck">
          <input type="checkbox" id="miniCheck" checked>
          ミニアメブースト
        </label>
      </div>

      <!-- Boost cap (visible when boost ON) -->
      <div class="setting-row" id="miniCapRow">
        <div class="setting-label" style="flex-direction:column; align-items:flex-start; gap:4px;">
          アメブースト上限
          <div style="display:flex; flex-direction:column; gap:4px;">
            <div style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:0.78rem; color:#888;">
              <input type="number" id="miniCapInput" value="350" min="1" max="9999" class="mini-cap-input">
              <span>個以降は通常として計算</span>
            </div>
            <div style="display:flex; gap:4px;">
              <button class="btn-cap-preset" data-cap="50">50</button>
              <button class="btn-cap-preset" data-cap="500">500</button>
            </div>
          </div>
        </div>
        <div class="segment" id="miniCapSegment">
          <button class="active" data-val="on">あり</button>
          <button data-val="off">なし</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Results -->
    <div class="result-cards">
      <div class="result-card candy-card">
        <div class="result-card-label">必要なアメ</div>

<script>
// [expCumul, candyCumul, shardsCumul] indexed by level (1-65)
const D = [
  null,
  [0, 0, 0],             // 1
  [54, 2, 28],           // 2
  [125, 4, 64],          // 3
  [233, 7, 130],         // 4
  [361, 11, 238],        // 5

  [19215, 648, 70140],   // 39
  [20108, 683, 76580],   // 40
  [21018, 720, 83684],   // 41
  [21946, 757, 91121],   // 42
  [22891, 795, 99139],   // 43
  [23854, 833, 107537],  // 44
  [24834, 872, 116390],  // 45
  [25831, 912, 125830],  // 46
  [26846, 953, 136080],  // 47
  [27878, 994, 146904],  // 48
  [28927, 1036, 158622], // 49
  [29993, 1079, 171307], // 50
  [31355, 1133, 187993], // 51
  [32917, 1196, 208342], // 52
  [34664, 1266, 232002], // 53
  [36610, 1343, 259414], // 54
  [38805, 1431, 292150], // 55
  [41084, 1522, 327731], // 56
  [43488, 1619, 370120], // 57
  [46021, 1720, 419206], // 58
  [48687, 1827, 476772], // 59
  [51493, 1939, 543188], // 60
  [54358, 2053, 617402], // 61
  [57280, 2170, 699068], // 62
  [60257, 2289, 788318], // 63
  [63286, 2411, 886406], // 64
  [66363, 2534, 992924], // 65
];

const NATURE_EXP = { up: 30, neutral: 25, down: 21 };
const TYPE_EXP_MULT = { 600: 1.0, 900: 1.5, 1080: 1.8, 1260: 2.1 };

let curLv = 15, tgtLv = 50, typeVal = 600, nature = 'neutral', boostOn = false, boostIsMini = true;
let remainingExp = Infinity; // Infinity → clamp to max in render()
let useMiniCap = true;
let miniCapValue = 350;
let normalCapValue = 3500;

function fmt(n) { return n.toLocaleString('ja-JP'); }

let _rafId = null;
function scheduleRender() {
  if (_rafId !== null) return;
  _rafId = requestAnimationFrame(() => { _rafId = null; render(); });
}

function updateSliderFill(el) {
  const min = parseInt(el.min), max = parseInt(el.max), val = parseInt(el.value);
  const pct = ((val - min) / (max - min)) * 100;
  el.style.background = `linear-gradient(to right, #4caf50 ${pct}%, #e0e0e0 ${pct}%)`;
}

function updateButtons() {
  document.getElementById('curDec').disabled = curLv <= 1;
  document.getElementById('curInc').disabled = curLv >= 64;
  document.getElementById('tgtDec').disabled = tgtLv <= curLv + 1;
  document.getElementById('tgtInc').disabled = tgtLv >= 65;
}

function render() {
  document.getElementById('curDisplay').textContent = curLv;
  document.getElementById('tgtDisplay').textContent = tgtLv;
  const cs = document.getElementById('curSlider');
  const ts = document.getElementById('tgtSlider');
  cs.value = curLv; ts.min = curLv + 1; ts.value = tgtLv;
  updateSliderFill(cs); updateSliderFill(ts);
  updateButtons();

  const typeExpMult = TYPE_EXP_MULT[typeVal];
  const epcBase    = NATURE_EXP[nature];
  const epcBoosted = epcBase * 2;
  const boost = !boostOn ? 'off' : boostIsMini ? 'mini' : 'normal';

  document.getElementById('boostSubGroup').style.display = boostOn ? 'block' : 'none';
  document.getElementById('miniCapInput').value = boostIsMini ? miniCapValue : normalCapValue;

  // Remaining EXP slider/input setup
  const maxExpFirst = Math.round((D[curLv + 1][0] - D[curLv][0]) * typeExpMult);
  if (remainingExp > maxExpFirst) remainingExp = maxExpFirst;
  if (remainingExp < 0) remainingExp = 0;
  const expSlider = document.getElementById('expSlider');
  const expInput  = document.getElementById('expInput');
  expSlider.max   = maxExpFirst;
  expSlider.value = remainingExp;
  expInput.max    = maxExpFirst;
  expInput.value  = remainingExp;
  updateSliderFill(expSlider);

  const initialCarry = maxExpFirst - remainingExp;
  const capVal = boostIsMini ? miniCapValue : normalCapValue;
  let capLeft = (boostOn && useMiniCap) ? capVal : Infinity;
  const shardsMult = boost === 'mini' ? 4 : boost === 'normal' ? 5 : 1;
  let sumCandy = 0, sumBoostedCandy = 0, sumNormalCandy = 0, sumShards = 0, expRem = 0, carry = initialCarry;
  for (let lv = curLv + 1; lv <= tgtLv; lv++) {
    const expLv = Math.round((D[lv][0] - D[lv-1][0]) * typeExpMult);
    expRem += expLv;
    const spc = (D[lv][2] - D[lv-1][2]) / (D[lv][1] - D[lv-1][1]) | 0;
    const expNeeded = Math.max(0, expLv - carry);
    const carryBase = Math.max(0, carry - expLv);
    let candyLv = 0, shardsLv = 0;
    if (boost === 'off') {
      candyLv = Math.ceil(expNeeded / epcBase);
      shardsLv = candyLv * spc;
      carry = candyLv * epcBase - expNeeded + carryBase;
    } else if (capLeft > 0) {
      const boostedNeeded = Math.ceil(expNeeded / epcBoosted);
      if (boostedNeeded <= capLeft) {
        candyLv = boostedNeeded;
        shardsLv = candyLv * spc * shardsMult;
        carry = candyLv * epcBoosted - expNeeded + carryBase;
        if (capLeft !== Infinity) capLeft -= boostedNeeded;
        sumBoostedCandy += candyLv;
      } else {
        const boostedExp = capLeft * epcBoosted;
        const expStillNeeded = expNeeded - boostedExp;
        const normalNeeded = Math.ceil(expStillNeeded / epcBase);
        candyLv = capLeft + normalNeeded;
        shardsLv = capLeft * spc * shardsMult + normalNeeded * spc;
        carry = normalNeeded * epcBase - expStillNeeded + carryBase;
        sumBoostedCandy += capLeft;
        sumNormalCandy += normalNeeded;
        capLeft = 0;
      }
    } else {
      candyLv = Math.ceil(expNeeded / epcBase);
      shardsLv = candyLv * spc;
      carry = candyLv * epcBase - expNeeded + carryBase;
      sumNormalCandy += candyLv;
    }
    sumCandy += candyLv;
    sumShards += shardsLv;
  }
  expRem -= initialCarry;
  document.getElementById('candyCount').textContent = fmt(sumCandy);
  document.getElementById('shardsValue').textContent = fmt(sumShards);
  document.getElementById('expValue').textContent = 'EXP ' + fmt(expRem);

  const showBreakdown = boostOn && useMiniCap && sumNormalCandy > 0;
  const breakdownEl = document.getElementById('candyBreakdown');
  breakdownEl.style.display = showBreakdown ? 'block' : 'none';
  if (showBreakdown) {
    document.getElementById('breakdownMini').textContent   = fmt(sumBoostedCandy);
    document.getElementById('breakdownNormal').textContent = fmt(sumNormalCandy);
  }
}

function setCurLv(v) {
  curLv = Math.max(1, Math.min(64, v));
  if (tgtLv <= curLv) tgtLv = curLv + 1;
  remainingExp = Infinity;
  scheduleRender();
}
function setTgtLv(v) {
  tgtLv = Math.max(curLv + 1, Math.min(65, v));
  scheduleRender();
}
function setRemainingExp(v) {
  remainingExp = Math.max(0, +v || 0);
  scheduleRender();
}

document.getElementById('curDec').addEventListener('click', () => setCurLv(curLv - 1));
document.getElementById('curInc').addEventListener('click', () => setCurLv(curLv + 1));
document.getElementById('curSlider').addEventListener('input', e => setCurLv(+e.target.value));
document.getElementById('tgtDec').addEventListener('click', () => setTgtLv(tgtLv - 1));
document.getElementById('tgtInc').addEventListener('click', () => setTgtLv(tgtLv + 1));
document.getElementById('tgtSlider').addEventListener('input', e => setTgtLv(+e.target.value));

document.getElementById('expSlider').addEventListener('input', e => setRemainingExp(+e.target.value));
document.getElementById('expInput').addEventListener('input', e => setRemainingExp(+e.target.value));

document.getElementById('typeSegment').addEventListener('click', e => {
  const btn = e.target.closest('button[data-val]');
  if (!btn) return;
  typeVal = +btn.dataset.val;
  document.querySelectorAll('#typeSegment button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  remainingExp = Infinity;
  render();
});

document.getElementById('natureSegment').addEventListener('click', e => {
  const btn = e.target.closest('button[data-val]');
  if (!btn) return;
  nature = btn.dataset.val;
  document.querySelectorAll('#natureSegment button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('boostSegment').addEventListener('click', e => {
  const btn = e.target.closest('button[data-val]');
  if (!btn) return;
  boostOn = btn.dataset.val === 'on';
  document.querySelectorAll('#boostSegment button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  scheduleRender();
});

document.getElementById('miniCheck').addEventListener('change', e => {
  boostIsMini = e.target.checked;
  scheduleRender();
});

document.getElementById('miniCapSegment').addEventListener('click', e => {
  const btn = e.target.closest('button[data-val]');
  if (!btn) return;
  useMiniCap = btn.dataset.val === 'on';
  document.querySelectorAll('#miniCapSegment button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('miniCapInput').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  if (!isNaN(v) && v >= 1) {
    if (boostIsMini) miniCapValue = v; else normalCapValue = v;
    render();
  }
});

document.querySelectorAll('.btn-shortcut[data-lv]').forEach(btn => {
  btn.addEventListener('click', () => setTgtLv(+btn.dataset.lv));
});

document.querySelectorAll('.btn-cap-preset[data-cap]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = +btn.dataset.cap;
    if (boostIsMini) miniCapValue = v; else normalCapValue = v;
    document.getElementById('miniCapInput').value = v;
    render();
  });
});

document.getElementById('typeHelpBtn').addEventListener('click', () => {
  document.getElementById('typeHelpPopup').classList.toggle('open');
});

render();
</script>
</body>
</html>
